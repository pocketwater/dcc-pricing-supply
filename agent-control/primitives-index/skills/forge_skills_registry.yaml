  - skill_id: Orders.reconcileToPDI
    domain: Orders
    status: active
    trigger_phrases:
      - "Julie says these ARNs are not in PDI, go find them"
      - "Find these dispatches in PDI Orders"
      - "Check whether these reference numbers exist in PDI"
      - "Reconcile this list to PDI and show found vs not found"
    non_triggers:
      - "Did we miss imports on 5/1?"
      - "Trace this dispatch from SFTP through ingest"
      - "Show me the blockers"
      - "Resolve blockers for this run"
    inputs_required:
      - identifier_type
      - identifiers
      - optional_date_scope
      - join_basis
    output_contract:
      type: reconcile_to_pdi_result
      deterministic: true
      artifacts:
        - found_not_found_table
        - count_summary
        - join_basis_declaration
      deterministic_rules:
        - "All reconciliations must use the declared join_basis and normalization_rules."
        - "Never infer a missing PDI order from absence alone; classify as not_found_in_join_scope unless Orders.traceMissingIngest is invoked."
    proof_required:
      - "Count check: distinct_input_count = found_count + not_found_count + ambiguous_match_count"
      - "Report duplicate_input_count separately; duplicates do not alter distinct_input_count reconciliation math."
      - "Sample proof rows for found and not_found_in_join_scope groups"
      - "Explicit statement of join basis and normalization applied"
      - "If date scope used, report rows excluded by date filter"
    overlaps_with:
      - skill: Orders.auditDay
        relationship: non_overlapping
        rationale: "auditDay is day-level health/completeness, not identifier-level reconciliation."
      - skill: Orders.traceMissingIngest
        relationship: non_overlapping
        rationale: "traceMissingIngest is lineage/forensics across pipeline stages; reconcileToPDI is join-scope existence validation only."
      - skill: Orders.blockerWorklist
        relationship: non_overlapping
        rationale: "blockerWorklist is blocker triage/resolution planning, not found/not-found reconciliation."
    evidence_prompts:
      - "Julie sent some orders she says aren't in PDI. Here are the ARNs, go find em. 192270 192688."
      - "Ok find 192709, 192564, and 192707,192398"
      - "We're looking for distinct ARNs that pass validation (including info/warnings) but do not have a matching ARN in PDI Orders."
    reuse_count: 3
    notes: >
      Promoted to active by explicit Jason approval. This skill is strictly
      reconciliation-only and must not drift into lineage forensics or blocker
      triage.
    last_seen: 2026-05-02
