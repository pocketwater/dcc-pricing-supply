registry_version: 0.1
last_registry_update: 2026-05-02

skills:
  - skill_id: Orders.auditDay
    domain: Orders
    status: active

    trigger_phrases:
     - "{count} dispatches on {date} seems high"
     - "No blockers on {date}?"
     - "Did we already import {date}?"
     - "Why does coverage look weird for {date}?"
     - "Did we miss importing dispatches on {date}?"
     - "Give me a day-level completeness check for {date}"
     - "Audit {date}"
     - "Sanity check {date}"

    non_triggers:
     - "Julie says these ARNs are not in PDI, go find them"
     - "Find these dispatches in PDI Orders"
     - "Check whether these reference numbers exist in PDI"
     - "Reconcile this list to PDI and show found vs not found"
     - "Trace this dispatch through ingest"
     - "Show me the blockers"
     - "Resolve blockers"

    intent: >
     Give an operator-facing day-level sanity check first.
     Evaluate operational health and completeness for a specific day by
     reconciling aggregate day-level counts and statuses across coverage,
     validation, blocker, ready/export, and imported/PDI proof surfaces.
     The default response must answer whether the day is complete, weird,
     blocked, failed, pending, or already imported. Detailed proof exists,
     but stays collapsed unless explicitly requested.

    inputs_required:
     - operational_date
     - optional_business_unit_scope
     - optional_terminal_or_destination_scope
     - completeness_basis

    response_profile:
     default_mode: operator_brief
     max_default_length: 12_lines
     no_terminal_transcript: true
     no_sql_dump: true
     no_schema_discovery_transcript: true
     proof_collapsed_by_default: true

    output_order:
      - verdict
      - key_counts
      - why_it_looks_weird
      - recommended_next_action
      - proof_available_note

    operator_brief_contract:
      verdict_required: true
      include_only:
        - day_status
        - expected_count
        - imported_or_closed_count
        - blocked_count
        - pending_or_failed_count
        - unresolved_count
        - top_gap_reason
        - recommended_next_action
      exclude_by_default:
        - raw SQL
        - terminal commands
        - terminal output
        - schema discovery steps
        - full blocker tables
        - full audit tables
        - batch GUIDs unless rerun is the recommended action
        - confidence scores
        - empathy scores
        - long footers

    expansion_commands:
      - "show proof"
      - "show blocker breakdown"
      - "show batch IDs"
      - "show SQL"
      - "full audit report"

    output_contract:
     type: audit_day_result
     deterministic: true
     default_artifacts:
      - operator_verdict
      - key_count_summary
      - top_gap_reason
      - recommended_next_action
     expanded_artifacts:
      - day_status_summary
      - day_count_waterfall
      - blocker_presence_summary
      - day_completeness_gap_summary
      - proof_surface_summary
      - recommended_next_action
     deterministic_rules:
      - "Default output must be an operator brief, not a forensic report."
      - "All counts must be reported with declared completeness_basis."
      - "Count math must be checked internally before answering."
      - "Raw SQL, terminal output, and schema discovery steps must not be shown unless explicitly requested."
      - "Identifier-level found/not-found lists are out of scope; route to Orders.reconcileToPDI when requested."
      - "Blocker detail table retrieval is out of scope; route to Orders.blockerWorklist mode=show for exact table output."
      - "If blocker_count = 0, include explicit zero-blocker proof in the expanded proof only."
      - "If day_completeness_gap_count > 0, include category-level gap reasons, not identifier-level rows."

    proof_required:
      - "Count math check: expected_day_volume = completed_or_imported + blocked + pending_or_failed + unresolved"
      - "Each component count must map to a declared proof surface"
      - "If blocker_count = 0, maintain explicit zero-blocker proof internally"
      - "If day_completeness_gap_count > 0, maintain category-level gap reasons internally"

    overlaps_with:
     - skill: Orders.findMissingFromPDI
       relationship: merged
       rationale: >
         Day-level completeness meaning merged into Orders.auditDay;
         identifier-list reconciliation redirects to Orders.reconcileToPDI;
         Orders.findMissingFromPDI must not execute as a standalone skill.
     - skill: Orders.reconcileToPDI
       relationship: non_overlapping
       rationale: >
        reconcileToPDI owns identifier-list reconciliation and found/not-found outputs.
     - skill: Orders.blockerWorklist
       relationship: non_overlapping
       rationale: >
        blockerWorklist owns exact blocker table retrieval and blocker resolution mode.

    execution_surface:
     harness: citysv-gravitate-pdi-ode
     mode: read_only
     intent_note: >
       Describes the real-world systems this skill interrogates when executed.
       Execution must remain read-only and operator-brief-first.
     likely_objects:
       - coverage views
       - validation views
       - ready/export views
       - blocker LU
       - daily driver run log
       - post-import closeout audit
       - PDI order proof queries

    safety:
     mutates_data: false
     prod_safe: true
     approval_required: false

    evidence_prompts:
     - "36 dispatches on a day we already imported seems very high. No blockers on 4/30?"

    example_default_output: |
     5/2 is not clean.

     Expected dispatches: 105
     Imported/closed out: 0
     Blocked: 49
     Eligible but not imported: 56

     Main issue: both 5/2 run attempts failed before export/import because the precheck references a missing eligible object.

     Next action: fix the stale object reference, rerun the 5/2 batches, then rerun auditDay.

     Proof is available if you want the full audit.

    reuse_count: 2
     notes: >
     Hardened with operator-brief-first response profile after first real test returned
     useful proof but too much terminal/query/report noise. Default grain is sanity
     check; expanded proof is opt-in.
    last_seen: 2026-05-04
     - skill_id: Orders.blockerWorklist
       domain: Orders
       status: active
    # -------------------------------------------------------------------
    # MODE SUPPORT
    # mode: show   — read-only blocker table retrieval (default)
    # mode: resolve — human-actionable triage + recommendation
    # Default: show unless user clearly asks for resolution/action
    # -------------------------------------------------------------------
    mode_routing:
      default_mode: show
      mode_show:
        triggers:
          - "show blockers"
          - "give me the blocker table"
          - "what blockers do we have"
          - "show me the blockers"
          - "what are the blockers for {date}"
          - "show blockers for {date}"
      mode_resolve:
        triggers:
          - "resolve blockers"
          - "let's resolve the blockers"
          - "work the blockers"
          - "work the blocker list"
          - "fix the human-actionable blockers"
          - "what are the human next actions for blockers"
    trigger_phrases:
      - "Show me the blockers"
      - "Give me the blocker table"
      - "What blockers do we have for {date}?"
      - "Let's resolve the blockers"
      - "Work the blockers"
      - "Resolve blockers"
    non_triggers:
      - "Did we already import {date}?"
      - "Why does coverage look weird for {date}?"
      - "Run the import"
      - "Patch the pipeline"
      - "Deploy the fix"
      - "Trace this dispatch through ingest"
      - "Find ARNs in PDI"
      - "Did we miss imports on {date}?"
    intent: >
      Retrieve or triage the blocker worklist for an operational date or range.
      mode=show returns the exact blocker table with reason breakdown and totals
      (read-only, no mutation).
      mode=resolve separates human-actionable blockers from hard blockers,
      produces recommended resolution steps, and defaults to recommendation-only
      until Jason explicitly approves any mutation.
    inputs_required:
      - operational_date_or_range
      - mode                        # show | resolve  (default: show)
      - optional_scope_subset       # optional: filter by blocker_type, terminal, destination
    output_contract:
      deterministic: true
      mode_show:
        artifacts:
          - blocker_table            # exact table rows — no narrative substitute
          - blocker_reason_summary   # grouped counts by reason code
          - blocker_totals           # total_blockers, impacted_order_count
          - zero_blocker_proof       # explicit confirmation if count = 0
        safety:
          mutates_data: false
          prod_safe: true
          approval_required: false
      mode_resolve:
        artifacts:
          - actionable_blocker_table       # rows a human can act on (DEST_UNRESOLVED, TERMINAL_UNRESOLVED)
          - non_actionable_blocker_table   # hard blockers outside human reach
          - recommended_resolution_steps   # recommendation-only by default
          - remaining_blocker_count        # after proposed actions
          - post_action_status_proof       # populated only if mutation was approved + executed
        safety:
          mutates_data: true              # only if Jason approves a specific mutation step
          prod_safe: false
          approval_required: true
    proof_required:
      mode_show:
        - blocker_table row count must match blocker_totals.total_blockers
        - zero_blocker_proof must be present and explicit when count = 0
      mode_resolve:
        - actionable_count + non_actionable_count = total_blockers from show surface
        - recommended_resolution_steps must cite specific blocker rows by key
        - no mutation step executes without explicit Jason approval in same session
    overlaps_with:
      - skill: Orders.auditDay
        relationship: non_overlapping
        rationale: "auditDay includes blocker_count as a single aggregate dimension; blockerWorklist owns dedicated blocker table retrieval and triage across both modes."
      - skill: Orders.traceMissingIngest
        relationship: non_overlapping
        rationale: "traceMissingIngest is source-to-ingest forensics on specific identifiers; blockerWorklist operates on the blocker surface only."
      - skill: Orders.reconcileToPDI
        relationship: non_overlapping
        rationale: "reconcileToPDI is identifier-level found/not-found reconciliation; blockerWorklist is blocker state triage and resolution."
    merged_from:
      - Orders.showBlockers    # collapsed — mode=show covers this primitive
      - Orders.resolveBlockers # collapsed — mode=resolve covers this primitive
    execution_surface:
      harness: citysv-gravitate-pdi-ode
      likely_objects:
        - blocker LU
        - validation views
        - handoff detail views
        - xref tables
    evidence_prompts:
      - "Ok, so you know, when I say \"show me the blockers\" I want to see exactly that table you just shared."
      - "Ok. Lets resolve the blockers"
      - "When I say lets \"resolve\" blockers I'm refering to the blockers that a human likely needs to solve"
    reuse_count: 3
    notes: >
      Collapsed from Orders.showBlockers and Orders.resolveBlockers.
      The distinction is mode, not primitive — a single skill with modal dispatch
      prevents duplicate trigger ambiguity. Actionable blockers are typically
      DEST_UNRESOLVED and TERMINAL_UNRESOLVED unless Jason redefines scope.
    last_seen: 2026-05-02
